<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Хурлын Дэлгэц</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=JetBrains+Mono:wght@300;400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --green: #0fff7a;
    --green-soft: rgba(15,255,122,.6);
    --green-glow: rgba(15,255,122,.4);
    --green-dim: rgba(15,255,122,.15);
    --bg: #000;
    --panel: rgba(0,20,10,.5);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{min-height:100vh;overflow-x:hidden;}
  body{
    background:#000;
    color:var(--green);
    font-family:'Inter', sans-serif;
    position:relative;
    min-height:100vh;
  }

  /* ========== ANIMATED BG LAYERS ========== */
  .stars{
    position:fixed;inset:0;
    background:
      radial-gradient(1px 1px at 20% 30%, var(--green) 50%, transparent),
      radial-gradient(1px 1px at 70% 80%, var(--green) 50%, transparent),
      radial-gradient(1px 1px at 40% 70%, #fff 50%, transparent),
      radial-gradient(2px 2px at 85% 15%, var(--green) 50%, transparent),
      radial-gradient(1px 1px at 10% 90%, #fff 50%, transparent),
      radial-gradient(1px 1px at 55% 50%, var(--green) 50%, transparent),
      radial-gradient(1px 1px at 90% 60%, #fff 50%, transparent),
      radial-gradient(2px 2px at 30% 10%, var(--green) 50%, transparent);
    background-size:200% 200%;
    opacity:.35;
    animation:drift 180s linear infinite;
    z-index:0;
    will-change:background-position;
  }
  @keyframes drift{from{background-position:0 0;}to{background-position:200% 200%;}}

  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:1;
    background:
      radial-gradient(ellipse 60% 50% at 50% 30%, rgba(15,255,122,.10), transparent 60%),
      radial-gradient(ellipse 80% 60% at 50% 100%, rgba(15,255,122,.06), transparent 60%);
  }

  /* perspective grid */
  .grid{
    position:fixed;left:0;right:0;bottom:0;height:50vh;
    background-image:
      linear-gradient(rgba(15,255,122,.15) 1px, transparent 1px),
      linear-gradient(90deg, rgba(15,255,122,.15) 1px, transparent 1px);
    background-size:60px 60px;
    transform:perspective(500px) rotateX(60deg);
    transform-origin:bottom;
    animation:gridscroll 20s linear infinite;
    mask-image:linear-gradient(to top, #000 0%, transparent 100%);
    -webkit-mask-image:linear-gradient(to top, #000 0%, transparent 100%);
    z-index:1;
    pointer-events:none;
  }
  @keyframes gridscroll{from{background-position:0 0;}to{background-position:0 60px;}}

  /* scanlines + moving scan bar */
  .scanlines{
    position:fixed;inset:0;pointer-events:none;z-index:50;
    background:repeating-linear-gradient(
      0deg,
      rgba(15,255,122,.03) 0px,
      rgba(15,255,122,.03) 1px,
      transparent 1px,
      transparent 3px
    );
  }
  .scan-bar{
    position:fixed;left:0;right:0;height:140px;pointer-events:none;z-index:51;
    background:linear-gradient(180deg, transparent, rgba(15,255,122,.06) 50%, transparent);
    animation:scanmove 7s linear infinite;
  }
  @keyframes scanmove{from{top:-140px;}to{top:100vh;}}

  /* corner brackets */
  .corner{
    position:fixed;width:36px;height:36px;
    border:2px solid var(--green);
    box-shadow:0 0 12px var(--green-glow);
    z-index:11;pointer-events:none;
    animation:cornerblink 3s ease-in-out infinite;
  }
  @keyframes cornerblink{0%,100%{opacity:1;}50%{opacity:.4;}}
  .corner.tl{top:20px;left:20px;border-right:none;border-bottom:none;}
  .corner.tr{top:20px;right:20px;border-left:none;border-bottom:none;}
  .corner.bl{bottom:20px;left:20px;border-right:none;border-top:none;}
  .corner.br{bottom:20px;right:20px;border-left:none;border-top:none;}

  /* ========== MAIN CONTENT ========== */
  .main{
    position:relative;z-index:5;
    min-height:100vh;
    padding:40px 24px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
  }

  .view{display:none;width:100%;}
  .view.active{display:flex;flex-direction:column;align-items:center;}

  /* === QR VIEW === */
  .header{text-align:center;margin-bottom:36px;animation:fadein .8s ease;}
  @keyframes fadein{from{opacity:0;transform:translateY(-12px);}to{opacity:1;transform:none;}}

  h1{
    font-family:'Orbitron', sans-serif;
    font-weight:900;font-size:46px;
    letter-spacing:.04em;
    color:var(--green);
    text-shadow:
      0 0 10px rgba(15,255,122,.8),
      0 0 30px rgba(15,255,122,.5),
      0 0 60px rgba(15,255,122,.3);
    animation:flicker 4s infinite;
    margin-bottom:14px;
  }
  h1 .accent{color:#fff;text-shadow:0 0 10px #fff, 0 0 28px var(--green);}
  @keyframes flicker{
    0%,18%,22%,25%,53%,57%,100%{opacity:1;}
    20%,24%,55%{opacity:.85;}
  }
  .subtitle{
    color:rgba(15,255,122,.75);
    font-family:'JetBrains Mono', monospace;
    font-size:13px;letter-spacing:.18em;text-transform:uppercase;
    margin-bottom:18px;
  }
  .badge{
    display:inline-flex;align-items:center;gap:8px;
    padding:7px 18px;
    border:1px solid var(--green);
    background:rgba(15,255,122,.08);
    color:var(--green);
    font-family:'JetBrains Mono', monospace;
    font-size:11px;letter-spacing:.2em;text-transform:uppercase;
    box-shadow:0 0 14px var(--green-glow), inset 0 0 14px rgba(15,255,122,.1);
    text-shadow:0 0 6px var(--green);
  }
  .badge::before{
    content:"";width:6px;height:6px;border-radius:50%;
    background:var(--green);box-shadow:0 0 8px var(--green);
    animation:dotpulse 1.4s infinite;
  }
  @keyframes dotpulse{0%,100%{opacity:1;}50%{opacity:.3;}}

  /* QR FRAME */
  .qr-frame{
    position:relative;
    width:380px;max-width:90vw;aspect-ratio:1;
    margin:20px 0 28px;
    animation:fadein 1s ease .2s both;
  }
  .ring-outer, .ring-mid, .ring-far{position:absolute;border-radius:50%;pointer-events:none;}
  .ring-far{
    inset:-220px;
    border:1.5px dashed rgba(15,255,122,.22);
    animation:spin 50s linear infinite;
    box-shadow:0 0 40px rgba(15,255,122,.08), inset 0 0 40px rgba(15,255,122,.05);
  }
  .ring-outer{
    inset:-140px;
    border:1.5px dashed rgba(15,255,122,.35);
    animation:spin 35s linear infinite reverse;
    box-shadow:0 0 30px rgba(15,255,122,.12);
  }
  .ring-mid{
    inset:-70px;
    border:1.5px dotted rgba(15,255,122,.55);
    animation:spin 22s linear infinite;
    box-shadow:0 0 20px rgba(15,255,122,.15);
  }
  .ring-far::before, .ring-far::after,
  .ring-outer::before, .ring-outer::after,
  .ring-mid::before, .ring-mid::after{
    content:"";position:absolute;
    background:var(--green);border-radius:50%;
    box-shadow:0 0 12px var(--green), 0 0 22px var(--green);
  }
  .ring-far::before, .ring-far::after{width:14px;height:14px;}
  .ring-outer::before, .ring-outer::after{width:12px;height:12px;}
  .ring-mid::before, .ring-mid::after{width:9px;height:9px;}
  .ring-far::before{top:-7px;left:50%;transform:translateX(-50%);}
  .ring-far::after{bottom:-7px;left:50%;transform:translateX(-50%);}
  .ring-outer::before{left:-6px;top:50%;transform:translateY(-50%);}
  .ring-outer::after{right:-6px;top:50%;transform:translateY(-50%);}
  .ring-mid::before{top:-4.5px;left:50%;transform:translateX(-50%);}
  .ring-mid::after{bottom:-4.5px;left:50%;transform:translateX(-50%);}
  @keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

  .qr-card{
    position:relative;width:100%;height:100%;
    background:#0a0a0a;
    border:2px solid var(--green);
    border-radius:18px;
    padding:24px;
    box-shadow:
      0 0 30px var(--green-glow),
      0 0 60px rgba(15,255,122,.2),
      inset 0 0 30px rgba(15,255,122,.08);
    display:grid;place-items:center;
    overflow:hidden;
  }
  .qr-corner{position:absolute;width:20px;height:20px;border:2px solid var(--green);box-shadow:0 0 8px var(--green);}
  .qr-corner.tl{top:8px;left:8px;border-right:none;border-bottom:none;}
  .qr-corner.tr{top:8px;right:8px;border-left:none;border-bottom:none;}
  .qr-corner.bl{bottom:8px;left:8px;border-right:none;border-top:none;}
  .qr-corner.br{bottom:8px;right:8px;border-left:none;border-top:none;}
  .qr-scan{
    position:absolute;left:24px;right:24px;height:3px;
    background:linear-gradient(90deg, transparent, var(--green), transparent);
    box-shadow:0 0 12px var(--green), 0 0 24px var(--green);
    animation:qrscan 2.5s ease-in-out infinite;
    z-index:2;
  }
  @keyframes qrscan{
    0%, 100%{top:24px;opacity:1;}
    50%{top:calc(100% - 27px);opacity:1;}
  }

  /* Real QR — recolor black→neon green */
  .qr-img{
    width:100%;height:100%;
    object-fit:contain;
    filter: invert(1) sepia(1) saturate(8) hue-rotate(80deg) brightness(1.1) drop-shadow(0 0 8px rgba(15,255,122,.4));
  }

  /* INFO BELOW QR */
  .info{text-align:center;animation:fadein 1s ease .4s both;}
  .info-title{
    font-family:'Orbitron', sans-serif;
    font-weight:700;font-size:24px;
    color:#fff;
    text-shadow:0 0 10px var(--green), 0 0 22px rgba(15,255,122,.5);
    margin-bottom:10px;
    letter-spacing:.02em;
  }
  .info-sub{
    color:rgba(15,255,122,.7);
    font-family:'JetBrains Mono', monospace;
    font-size:12px;letter-spacing:.16em;text-transform:uppercase;
    margin-bottom:24px;
  }
  .counter{
    display:inline-flex;align-items:center;gap:12px;
    padding:14px 24px;
    background:rgba(15,255,122,.08);
    border:1px solid var(--green);
    color:var(--green);
    font-family:'JetBrains Mono', monospace;
    font-size:14px;font-weight:500;
    letter-spacing:.12em;text-transform:uppercase;
    box-shadow:0 0 18px var(--green-glow), inset 0 0 18px rgba(15,255,122,.08);
    text-shadow:0 0 6px var(--green);
  }
  .counter .dot{
    width:8px;height:8px;border-radius:50%;
    background:var(--green);
    box-shadow:0 0 10px var(--green), 0 0 20px var(--green);
    animation:dotpulse 1.4s ease-in-out infinite;
  }
  .counter .num{
    font-family:'Orbitron', sans-serif;
    font-weight:700;font-size:18px;color:#fff;
    text-shadow:0 0 8px var(--green);
    min-width:24px;text-align:center;
    transition:all .4s;
  }
  .counter .num.bump{color:#fff;text-shadow:0 0 20px #fff, 0 0 40px var(--green);}

  .wave{display:flex;gap:4px;align-items:center;height:24px;margin-top:18px;justify-content:center;}
  .wave span{
    width:3px;background:var(--green);border-radius:2px;
    box-shadow:0 0 6px var(--green);
    animation:bars 1.2s ease-in-out infinite;
  }
  .wave span:nth-child(1){height:8px;animation-delay:0s;}
  .wave span:nth-child(2){height:14px;animation-delay:.1s;}
  .wave span:nth-child(3){height:20px;animation-delay:.2s;}
  .wave span:nth-child(4){height:16px;animation-delay:.3s;}
  .wave span:nth-child(5){height:22px;animation-delay:.4s;}
  .wave span:nth-child(6){height:12px;animation-delay:.5s;}
  .wave span:nth-child(7){height:18px;animation-delay:.6s;}
  .wave span:nth-child(8){height:10px;animation-delay:.7s;}
  .wave span:nth-child(9){height:14px;animation-delay:.8s;}
  @keyframes bars{0%,100%{transform:scaleY(.3);}50%{transform:scaleY(1);}}

  /* === TOP 3 VIEW === */
  .top3-header{text-align:center;margin-bottom:30px;animation:fadein .8s ease;}
  .top3-grid{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:24px;
    max-width:1700px;
    width:100%;
    animation:fadein .8s ease .15s both;
  }
  @media (max-width:1400px){.top3-grid{grid-template-columns:1fr 1fr;}}
  @media (max-width:900px){.top3-grid{grid-template-columns:1fr;}}

  .q-card{
    position:relative;
    background:rgba(0,20,10,.55);
    border:1.5px solid var(--green);
    border-radius:18px;
    padding:32px 28px 28px;
    box-shadow:0 0 24px var(--green-glow), inset 0 0 24px rgba(15,255,122,.05);
    overflow:hidden;
  }
  .q-card .q-corner{
    position:absolute;width:16px;height:16px;
    border:2px solid var(--green);
    box-shadow:0 0 6px var(--green);
  }
  .q-card .q-corner.tl{top:8px;left:8px;border-right:none;border-bottom:none;}
  .q-card .q-corner.tr{top:8px;right:8px;border-left:none;border-bottom:none;}
  .q-card .q-corner.bl{bottom:8px;left:8px;border-right:none;border-top:none;}
  .q-card .q-corner.br{bottom:8px;right:8px;border-left:none;border-top:none;}
  .q-rank{
    display:inline-flex;align-items:center;justify-content:center;
    width:54px;height:54px;
    background:rgba(15,255,122,.08);
    border:2px solid var(--green);
    border-radius:50%;
    font-family:'Orbitron', sans-serif;
    font-weight:900;font-size:26px;
    color:#fff;
    text-shadow:0 0 12px var(--green), 0 0 24px rgba(15,255,122,.6);
    box-shadow:0 0 16px var(--green-glow), inset 0 0 16px rgba(15,255,122,.1);
    margin-bottom:16px;
  }
  .q-author{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;letter-spacing:.18em;text-transform:uppercase;
    color:rgba(15,255,122,.7);
    margin-bottom:14px;
  }
  .q-text{
    font-family:'Orbitron', sans-serif;
    font-weight:500;
    font-size:22px;line-height:1.45;
    color:#fff;
    text-shadow:0 0 8px rgba(15,255,122,.4);
    margin-bottom:22px;
    letter-spacing:.005em;
  }
  .q-reason{
    background:rgba(0,0,0,.4);
    border-left:3px solid var(--green);
    padding:14px 16px;
    border-radius:0 10px 10px 0;
    font-family:'Inter', sans-serif;
    font-size:13.5px;line-height:1.65;
    color:rgba(15,255,122,.85);
    box-shadow:inset 0 0 10px rgba(15,255,122,.05);
  }
  .q-reason b{
    display:block;
    font-family:'JetBrains Mono', monospace;
    font-size:10px;letter-spacing:.2em;text-transform:uppercase;
    color:var(--green);
    margin-bottom:6px;
    text-shadow:0 0 6px var(--green);
  }

  /* === THINKING VIEW === */
  #viewThinking.active{justify-content:flex-start;padding-top:20px;}
  .thinking-title{text-align:center;margin-bottom:10px;animation:fadein .6s ease;}
  .thinking-title h1{
    font-family:'Orbitron',sans-serif;font-weight:900;
    font-size:30px;letter-spacing:.2em;color:var(--green);
    text-shadow:0 0 10px var(--green),0 0 28px rgba(15,255,122,.5);
    animation:flicker 4s infinite;
  }
  .dots-anim{display:inline-block;animation:dots 1.5s steps(4) infinite;width:1em;text-align:left;}
  @keyframes dots{0%{content:"";}25%{content:".";}50%{content:"..";}75%,100%{content:"...";}}
  .thinking-title .subtitle{margin-top:8px;}

  .thinking-stage{
    position:relative;
    width:100%;
    display:flex;justify-content:center;align-items:center;
    margin:10px 0;
  }
  .t-scene{
    position:relative;width:520px;height:600px;
    display:grid;place-items:center;
  }
  .t-ring{position:absolute;border-radius:50%;pointer-events:none;}
  .t-ring-far{
    width:520px;height:600px;
    border:1.5px dashed rgba(15,255,122,.22);
    animation:spin 50s linear infinite;
    box-shadow:0 0 40px rgba(15,255,122,.08), inset 0 0 40px rgba(15,255,122,.05);
  }
  .t-ring-outer{
    width:420px;height:500px;
    border:1.5px dashed rgba(15,255,122,.35);
    animation:spin 35s linear infinite reverse;
    box-shadow:0 0 30px rgba(15,255,122,.12);
  }
  .t-ring-mid{
    width:320px;height:400px;
    border:1.5px dotted rgba(15,255,122,.55);
    animation:spin 22s linear infinite;
    box-shadow:0 0 20px rgba(15,255,122,.15);
  }
  .t-ring-far::before, .t-ring-far::after,
  .t-ring-outer::before, .t-ring-outer::after,
  .t-ring-mid::before, .t-ring-mid::after{
    content:"";position:absolute;background:var(--green);border-radius:50%;
    box-shadow:0 0 12px var(--green), 0 0 22px var(--green);
  }
  .t-ring-far::before, .t-ring-far::after{width:14px;height:14px;}
  .t-ring-outer::before, .t-ring-outer::after{width:12px;height:12px;}
  .t-ring-mid::before, .t-ring-mid::after{width:9px;height:9px;}
  .t-ring-far::before{top:-7px;left:50%;transform:translateX(-50%);}
  .t-ring-far::after{bottom:-7px;left:50%;transform:translateX(-50%);}
  .t-ring-outer::before{left:-6px;top:50%;transform:translateY(-50%);}
  .t-ring-outer::after{right:-6px;top:50%;transform:translateY(-50%);}
  .t-ring-mid::before{top:-4.5px;left:50%;transform:translateX(-50%);}
  .t-ring-mid::after{bottom:-4.5px;left:50%;transform:translateX(-50%);}

  /* ============ AI VIDEO FRAME ============ */
  .ai-frame{
    position:relative;width:380px;height:480px;
    display:grid;place-items:center;
    animation:aiFloat 5s ease-in-out infinite;
  }
  @keyframes aiFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}

  .ai-img-wrap{
    position:relative;
    width:340px;height:440px;
    border-radius:28px;
    overflow:hidden;
    border:3px solid var(--green);
    box-shadow:
      0 0 30px var(--green-glow),
      0 0 60px rgba(15,255,122,.35),
      0 0 100px rgba(15,255,122,.2),
      inset 0 0 30px rgba(15,255,122,.18);
    background:#000;
    box-shadow:0 0 30px var(--green-glow),0 0 60px rgba(15,255,122,.35),inset 0 0 30px rgba(15,255,122,.18);
    z-index:5;
    will-change:opacity;
  }
  /* Border pulse via cheap opacity-based pseudo glow (no expensive box-shadow rewrites) */
  .ai-img-wrap::after{
    content:"";
    position:absolute;inset:-3px;border-radius:30px;
    border:2px solid var(--green);
    box-shadow:0 0 22px var(--green);
    opacity:.4;
    animation:aiBorderPulse 2.4s ease-in-out infinite;
    pointer-events:none;
  }
  @keyframes aiBorderPulse{
    0%,100%{opacity:.35;}
    50%{opacity:.9;}
  }

  .ai-img{
    width:100%;height:100%;object-fit:cover;
    display:block;
    filter:contrast(1.05) saturate(1.15) brightness(1.05);
    background:#000;
  }
  /* Video-specific tweaks */
  video.ai-img{
    pointer-events:none;
  }

  /* fallback if image is missing */
  .ai-fallback{
    position:absolute;inset:0;
    place-items:center;
    font-family:'Orbitron',sans-serif;font-weight:900;
    font-size:120px;color:var(--green);
    background:radial-gradient(circle, rgba(15,255,122,.1), #000 70%);
    text-shadow:0 0 30px var(--green),0 0 60px var(--green);
  }

  /* horizontal scan bar across the face */
  .ai-scan-h{
    position:absolute;left:0;right:0;height:3px;
    background:linear-gradient(90deg,transparent,#fff,var(--green),#fff,transparent);
    box-shadow:0 0 12px var(--green),0 0 24px var(--green);
    animation:aiScanV 2.2s ease-in-out infinite;
    z-index:6;mix-blend-mode:screen;
  }
  @keyframes aiScanV{
    0%,100%{top:8%;opacity:.9;}
    50%{top:92%;opacity:.9;}
  }

  /* faint scan-grid overlay */
  .ai-grid-overlay{
    position:absolute;inset:0;pointer-events:none;z-index:7;
    background:
      repeating-linear-gradient(0deg,rgba(15,255,122,.06) 0px,rgba(15,255,122,.06) 1px,transparent 1px,transparent 4px);
    mix-blend-mode:screen;opacity:.6;
  }

  /* subtle green tint */
  .ai-tint{
    position:absolute;inset:0;pointer-events:none;z-index:8;
    background:radial-gradient(circle, transparent 30%, rgba(15,255,122,.18) 100%);
    mix-blend-mode:screen;
  }

  /* noise/glitch overlay — removed (heavy SVG turbulence caused stuttering) */
  .ai-noise{display:none;}

  /* AURAS — lighter (fewer blur layers, GPU-friendly) */
  .ai-aura{position:absolute;border-radius:32px;pointer-events:none;will-change:opacity;}
  .ai-aura-1{
    inset:-20px;
    background:radial-gradient(ellipse 55% 65% at center, rgba(15,255,122,.35) 30%, transparent 70%);
    opacity:.7;
    animation:auraPulse 2.4s ease-in-out infinite;
    z-index:1;
  }
  .ai-aura-2{
    inset:-40px;
    background:radial-gradient(ellipse 55% 65% at center, rgba(15,255,122,.2) 30%, transparent 70%);
    opacity:.5;
    animation:auraPulse 3.2s ease-in-out infinite reverse;
    z-index:0;
  }
  /* Removed .ai-aura-3 (excess blur layer) */
  .ai-aura-3{display:none;}
  @keyframes auraPulse{
    0%,100%{opacity:.4;transform:scale(1);}
    50%{opacity:.85;transform:scale(1.08);}
  }

  /* ORBITS — small spheres circling the image */
  .ai-orbit{
    position:absolute;inset:-20px;border-radius:36px;
    animation:spin 12s linear infinite;
    z-index:4;pointer-events:none;
  }
  .ai-orbit-2{
    inset:-40px;border-radius:48px;
    animation:spin 18s linear infinite reverse;
  }
  .ai-orbit .orb{
    position:absolute;
    width:14px;height:14px;border-radius:50%;
    background:var(--green);
    box-shadow:0 0 12px var(--green),0 0 24px var(--green),0 0 36px rgba(15,255,122,.5);
  }
  .ai-orbit .orb:nth-child(1){top:-7px;left:50%;transform:translateX(-50%);}
  .ai-orbit .orb:nth-child(2){bottom:-7px;left:50%;transform:translateX(-50%);}
  .ai-orbit .orb:nth-child(3){left:-7px;top:50%;transform:translateY(-50%);}
  .ai-orbit .orb:nth-child(4){right:-7px;top:50%;transform:translateY(-50%);}
  .ai-orbit-2 .orb{width:10px;height:10px;background:#fff;box-shadow:0 0 10px #fff,0 0 20px var(--green);}
  .ai-orbit-2 .orb:nth-child(1){top:50%;left:0;transform:translate(-50%,-50%) rotate(60deg) translateY(-50%);}
  .ai-orbit-2 .orb:nth-child(2){top:0;left:50%;transform:translate(-50%,-50%) rotate(180deg) translateY(-50%);}
  .ai-orbit-2 .orb:nth-child(3){top:100%;left:50%;transform:translate(-50%,-50%) rotate(300deg) translateY(-50%);}

  /* PARTICLES emerging from the image */
  .ai-particles{
    position:absolute;inset:0;pointer-events:none;z-index:3;
  }
  .ai-particles span{
    position:absolute;
    width:6px;height:6px;border-radius:50%;
    background:var(--green);
    box-shadow:0 0 8px var(--green),0 0 16px var(--green);
    opacity:0;
    animation:particleRise 3s ease-out infinite;
  }

  @keyframes particleRise{
    0%{opacity:0;transform:translate(var(--sx,0),0) scale(0);}
    10%{opacity:1;transform:translate(var(--sx,0),0) scale(1);}
    100%{opacity:0;transform:translate(var(--tx,0),var(--ty,-120px)) scale(.3);}
  }

  /* BURST on decide */
  .ai-burst{
    position:absolute;inset:-30px;border-radius:50%;
    pointer-events:none;opacity:0;
    background:radial-gradient(circle, rgba(255,255,255,.6) 0%, rgba(15,255,122,.4) 30%, transparent 70%);
    z-index:2;
  }

  /* === DECIDE STATE === */
  .ai-frame[data-state="decide"] .ai-img-wrap{
    border-color:#fff;
    animation:aiDecideBorder 1.2s ease-out forwards;
  }
  .ai-frame[data-state="decide"] .ai-img{
    animation:aiDecideImg 1.2s ease-out forwards;
    transform-origin:center center;
  }
  .ai-frame[data-state="decide"] .ai-burst{
    animation:aiBurst 1.4s ease-out;
  }
  .ai-frame[data-state="decide"] .ai-aura-1,
  .ai-frame[data-state="decide"] .ai-aura-2,
  .ai-frame[data-state="decide"] .ai-aura-3{
    animation:auraExpand 1.4s ease-out forwards;
  }
  @keyframes aiDecideBorder{
    0%{box-shadow:0 0 30px var(--green-glow);}
    30%{box-shadow:0 0 80px #fff, 0 0 160px var(--green);}
    100%{box-shadow:0 0 60px #fff, 0 0 120px var(--green), inset 0 0 50px rgba(15,255,122,.3);}
  }
  @keyframes aiDecideImg{
    0%{transform:scale(1);filter:brightness(1.05);}
    30%{transform:scale(1.15);filter:brightness(1.8) contrast(1.3) saturate(1.5);}
    100%{transform:scale(1.06);filter:brightness(1.25) contrast(1.15) saturate(1.3);}
  }
  @keyframes aiBurst{
    0%{opacity:0;transform:scale(.5);}
    20%{opacity:1;transform:scale(1.2);}
    100%{opacity:0;transform:scale(2.5);}
  }
  @keyframes auraExpand{
    0%{opacity:.5;transform:scale(1);}
    50%{opacity:1;transform:scale(1.5);}
    100%{opacity:.6;transform:scale(1.2);}
  }

  /* legacy robot CSS kept for fallback (hidden — image is used instead) */
  .robot{display:none;}

  .halo{
    position:absolute;top:-26px;left:50%;transform:translateX(-50%);

    border:1.5px solid var(--green);border-radius:50%;

  .halo::before, .halo::after{

  @keyframes halospin{from{transform:translateX(-50%) rotateY(0deg);}to{transform:translateX(-50%) rotateY(360deg);}}

  .head{
    position:absolute;top:8px;left:50%;transform:translateX(-50%);

  .head::before{

  .robot[data-state="think"] .eyes{display:none;}

  .robot[data-state="decide"] .head{
    border-color:#fff;

  .chin{

  .chin::before{

  @keyframes chinpulse{0%,100%{opacity:.5;width:14px;}50%{opacity:1;width:22px;}}

  .neck{
    position:absolute;top:138px;left:50%;transform:translateX(-50%);

    border:1.5px solid var(--green);border-radius:6px;
    box-shadow:0 0 10px var(--green-glow);z-index:1;
  }
  .neck::before, .neck::after{
    content:"";position:absolute;left:50%;transform:translateX(-50%);
    width:30px;height:1px;background:var(--green);box-shadow:0 0 4px var(--green);
  }
  .neck::before{top:5px;}
  .neck::after{bottom:5px;}

  .r-body{
    position:absolute;top:152px;left:50%;transform:translateX(-50%);
    width:160px;height:140px;
    background:linear-gradient(180deg,#1a221d 0%, #0a0f0c 100%);
    border:2px solid var(--green);border-radius:30px 30px 22px 22px;
    box-shadow:0 0 25px var(--green-glow), inset 0 0 25px rgba(15,255,122,.1), inset 0 -8px 20px rgba(0,0,0,.5);
    overflow:hidden;
  }
  .r-body::before, .r-body::after{
    content:"";position:absolute;top:-4px;width:28px;height:36px;
    background:linear-gradient(180deg,#1a221d,#0a0f0c);
    border:1.5px solid var(--green);
    box-shadow:0 0 10px var(--green-glow);
  }
  .r-body::before{left:-6px;border-radius:14px 4px 14px 4px;}
  .r-body::after{right:-6px;border-radius:4px 14px 4px 14px;}

  .core{
    position:absolute;top:30px;left:50%;transform:translateX(-50%);
    width:54px;height:54px;border-radius:50%;
    background:radial-gradient(circle at 38% 30%, #fff 0%, #aaffd1 12%, var(--green) 35%, #006a31 70%, #00220f 100%);
    box-shadow:0 0 20px var(--green), 0 0 40px var(--green), 0 0 70px rgba(15,255,122,.4), inset 0 0 14px rgba(0,0,0,.4);
    animation:corepulse 1.8s ease-in-out infinite;
  }
  @keyframes corepulse{
    0%,100%{transform:translateX(-50%) scale(1);}
    50%{transform:translateX(-50%) scale(1.06);}
  }
  .core::after{
    content:"";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:14px;height:14px;border-radius:50%;
    background:#fff;box-shadow:0 0 12px #fff;
    animation:innerpulse 1.4s ease-in-out infinite;
  }
  @keyframes innerpulse{0%,100%{opacity:1;transform:translate(-50%,-50%) scale(1);}50%{opacity:.5;transform:translate(-50%,-50%) scale(.6);}}

  .bars{
    position:absolute;bottom:14px;left:18px;right:18px;
    display:flex;flex-direction:column;gap:5px;
  }
  .bar{height:4px;background:rgba(15,255,122,.15);overflow:hidden;border-radius:2px;}
  .bar::after{
    content:"";display:block;height:100%;background:var(--green);
    box-shadow:0 0 6px var(--green);
    animation:fill 2.4s ease-in-out infinite alternate;
  }
  .bar.b1::after{width:75%;}
  .bar.b2::after{width:55%;animation-delay:.3s;}
  .bar.b3::after{width:90%;animation-delay:.6s;}
  @keyframes fill{from{transform:scaleX(.5);transform-origin:left;}to{transform:scaleX(1);transform-origin:left;}}

  .sensor{
    position:absolute;width:6px;height:6px;border-radius:50%;
    background:var(--green);box-shadow:0 0 6px var(--green);
    animation:dotpulse 1.2s ease-in-out infinite;
  }
  .sensor.s1{top:24px;left:14px;}
  .sensor.s2{top:36px;left:14px;animation-delay:.2s;}
  .sensor.s3{top:24px;right:14px;animation-delay:.4s;}
  .sensor.s4{top:36px;right:14px;animation-delay:.6s;}

  .arm{
    position:absolute;top:170px;width:18px;height:80px;

    box-shadow:0 0 10px var(--green-glow), inset 0 0 6px rgba(15,255,122,.15);
    transform-origin:top center;z-index:0;
  }
  .arm.left{left:6px;animation:armSwayL 3.5s ease-in-out infinite;}

    content:"";position:absolute;top:-4px;left:50%;transform:translateX(-50%);

    background:var(--green);box-shadow:0 0 8px var(--green);
  }
  .arm::after{
    content:"";position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);
    width:26px;height:26px;border-radius:50% 50% 45% 45%;
    background:linear-gradient(180deg,#1a221d,#0a0f0c);
    border:2px solid var(--green);
    box-shadow:0 0 12px var(--green-glow), 0 0 22px rgba(15,255,122,.3), inset 0 0 6px rgba(15,255,122,.2);
  }
  @keyframes armSwayL{0%,100%{transform:rotate(8deg);}50%{transform:rotate(-4deg);}}
  @keyframes armSwayR{0%,100%{transform:rotate(-8deg);}50%{transform:rotate(4deg);}}

  .robot[data-state="think"] .arm.right{animation:armThink 2.4s ease-in-out infinite;}
  @keyframes armThink{0%,100%{transform:rotate(-95deg) translateX(-10px);}50%{transform:rotate(-100deg) translateX(-12px);}}
  .robot[data-state="decide"] .arm.left{animation:armCelebrateL .9s ease-out forwards;}
  .robot[data-state="decide"] .arm.right{animation:armCelebrateR .9s ease-out forwards;}
  @keyframes armCelebrateL{0%{transform:rotate(0deg);}100%{transform:rotate(140deg);}}
  @keyframes armCelebrateR{0%{transform:rotate(0deg);}100%{transform:rotate(-140deg);}}

  .base{
    position:absolute;bottom:0;left:50%;transform:translateX(-50%);
    width:120px;height:30px;z-index:-1;
  }
  .base-disk{
    position:absolute;bottom:0;left:50%;transform:translateX(-50%);
    width:120px;height:18px;
    background:radial-gradient(ellipse at 50% 0%, var(--green) 0%, rgba(15,255,122,.3) 30%, transparent 70%);

  }

  .t-status{
    margin-top:20px;text-align:center;
  }
  .status-tag{
    display:inline-flex;align-items:center;gap:10px;padding:10px 22px;

    font-family:'JetBrains Mono',monospace;

  }

  @media (max-width:780px){

</style>
</head>
<body>

<div class="stars"></div>
<div class="grid"></div>
<div class="scanlines"></div>
<div class="scan-bar"></div>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<main class="main">

  <!-- QR COLLECTION VIEW -->
  <section id="viewQR" class="view active">
    <div class="header">
      <h1>АСУУЛТАА ИЛГ<span class="accent">Э</span>ЭН<span class="accent">Э</span> ҮҮ</h1>
      <div class="subtitle">// Утсаараа QR кодыг скан хийнэ үү</div>
      <div class="badge">Илтгэл · #<span id="roundNumQR">1</span></div>
    </div>

    <div class="qr-frame">
      <div class="ring-far"></div>
      <div class="ring-outer"></div>
      <div class="ring-mid"></div>
      <div class="qr-card">
        <div class="qr-corner tl"></div>
        <div class="qr-corner tr"></div>
        <div class="qr-corner bl"></div>
        <div class="qr-corner br"></div>
        <div class="qr-scan"></div>
        <img id="qrImg" class="qr-img" alt="QR Code" />
      </div>
    </div>

    <div class="info">
      <div class="info-title">// Утсаараа QR кодыг скан хийнэ үү</div>
      <div class="info-sub">Илтгэгчдэд асуултаа бичээд илгээнэ үү</div>
      <div class="counter">
        <span class="dot"></span>
        <span class="num" id="count">0</span>
        <span>асуулт ирлээ</span>
      </div>
      <div class="wave">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
      </div>
    </div>
  </section>

  <!-- TOP 3 VIEW -->
  <section id="viewTop" class="view">
    <div class="top3-header">
      <div class="badge">Илтгэл · #<span id="roundNumTop">1</span></div>
    </div>
    <div class="top3-grid" id="top3Grid"></div>
  </section>

  <!-- THINKING VIEW -->
  <section id="viewThinking" class="view">
    <div class="thinking-title">
      <h1>AI ТООЦООЛОЛ ХИЙЖ БАЙНА<span class="dots-anim">...</span></h1>
      <div class="subtitle">// Neural reasoning · live</div>
    </div>

    <div class="thinking-stage">
      <div class="t-scene">
        <div class="t-ring t-ring-far"></div>
        <div class="t-ring t-ring-outer"></div>
        <div class="t-ring t-ring-mid"></div>

        <div class="ai-frame" id="aiFrame" data-state="think">
          <div class="ai-aura ai-aura-1"></div>
          <div class="ai-aura ai-aura-2"></div>
          <div class="ai-aura ai-aura-3"></div>

          <div class="ai-img-wrap">
            <video
              id="aiVideo"
              class="ai-img"
              src="/ai-thinking.mp4"
              poster="/ai-thinking.png"
              autoplay
              loop
              muted
              playsinline
              preload="auto"
            ></video>
            <div class="ai-fallback" style="display:none">AI</div>
            <div class="ai-scan-h"></div>
            <div class="ai-grid-overlay"></div>
            <div class="ai-tint"></div>
            <svg class="ai-noise" viewBox="0 0 100 100" preserveAspectRatio="none">
              <filter id="noiseF"><feTurbulence baseFrequency="0.9" /></filter>
              <rect width="100%" height="100%" filter="url(#noiseF)" opacity="0.1"/>
            </svg>
          </div>

          <div class="ai-orbit">
            <span class="orb"></span>
            <span class="orb"></span>
            <span class="orb"></span>
            <span class="orb"></span>
          </div>
          <div class="ai-orbit ai-orbit-2">
            <span class="orb"></span>
            <span class="orb"></span>
            <span class="orb"></span>
          </div>

          <div class="ai-particles" id="aiParticles"></div>
          <div class="ai-burst"></div>
        </div>
      </div>
    </div>

    <div class="t-status">
      <div class="status-tag">
        <span class="pulse-dot"></span>
        <span id="statusText">ANALYZING INPUT</span>
      </div>
    </div>
  </section>

</main>

<script>
  function escapeHtml(str){
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  let qrLoaded = false;
  let lastCount = 0;
  let mode = 'qr';
  let pendingTopTwo = null;       // Top 3 result waiting for thinking timer
  let robotDecideTimer = null;
  const STATUSES = ['ANALYZING INPUT', 'WEIGHTING OPTIONS', 'EVALUATING TOPIC FIT', 'SIMULATING…', 'RANKING CANDIDATES'];
  let statusIdx = 0;
  let statusTimer = null;

  async function loadQR(){
    if (qrLoaded) return;
    try {
      const r = await fetch('/api/qr');
      const j = await r.json();
      document.getElementById('qrImg').src = j.qr;
      qrLoaded = true;
    } catch(e){}
  }

  function bumpCounter(){
    const el = document.getElementById('count');
    el.classList.add('bump');
    setTimeout(()=>el.classList.remove('bump'), 800);
  }

  async function loadStats(){
    try {
      const r = await fetch('/api/questions');
      const j = await r.json();
      const newCount = j.currentRoundCount || 0;
      if (newCount > lastCount && lastCount > 0) bumpCounter();
      lastCount = newCount;
      document.getElementById('count').textContent = newCount;
    } catch(e){}
  }

  function renderTop3(topTwo){
    const grid = document.getElementById('top3Grid');
    grid.innerHTML = topTwo.items.map((it, i) => {
      const display = it.displayQuestion || it.question;
      return `
      <div class="q-card">
        <div class="q-corner tl"></div>
        <div class="q-corner tr"></div>
        <div class="q-corner bl"></div>
        <div class="q-corner br"></div>
        <div class="q-rank">${i+1}</div>
        <div class="q-author">// ${escapeHtml(it.name)}</div>
        <div class="q-text">${escapeHtml(display)}</div>
      </div>`;
    }).join('');
  }

  function switchView(target){
    if (mode === target) return;
    mode = target;
    document.getElementById('viewQR').classList.toggle('active', target === 'qr');
    document.getElementById('viewTop').classList.toggle('active', target === 'top');
    document.getElementById('viewThinking').classList.toggle('active', target === 'thinking');

    if (target === 'thinking') {
      startThinkingAnimation();
    } else {
      stopThinkingAnimation();
    }
  }

  // Video error fallback — if MP4 fails to load, show poster image only
  (function setupVideoFallback(){
    const video = document.getElementById('aiVideo');
    if (!video) return;
    video.addEventListener('error', () => {
      const img = document.createElement('img');
      img.src = '/ai-thinking.png';
      img.className = video.className;
      img.alt = 'AI';
      video.parentNode.replaceChild(img, video);
    });
    // Try to play (some browsers block autoplay even when muted)
    video.play().catch(() => {/* autoplay blocked, ignore */});
  })();

  // Build particle elements once
  (function buildParticles(){
    const container = document.getElementById('aiParticles');
    if (!container) return;
    const N = 14;
    for (let i = 0; i < N; i++) {
      const s = document.createElement('span');
      const angle = (i / N) * Math.PI * 2 + Math.random() * 0.5;
      const dist = 80 + Math.random() * 80;
      s.style.left = `${50 + (Math.cos(angle) * 8)}%`;
      s.style.top = `${50 + (Math.sin(angle) * 8)}%`;
      s.style.setProperty('--tx', `${Math.cos(angle) * dist}px`);
      s.style.setProperty('--ty', `${Math.sin(angle) * dist}px`);
      s.style.animationDelay = `${(Math.random() * 3).toFixed(2)}s`;
      container.appendChild(s);
    }
  })();

  function startThinkingAnimation(){
    const frame = document.getElementById('aiFrame');
    if (frame) frame.setAttribute('data-state', 'think');
    statusIdx = 0;
    document.getElementById('statusText').textContent = STATUSES[0];
    clearInterval(statusTimer);
    statusTimer = setInterval(() => {
      statusIdx = (statusIdx + 1) % STATUSES.length;
      document.getElementById('statusText').textContent = STATUSES[statusIdx];
    }, 1100);
  }

  function stopThinkingAnimation(){
    clearInterval(statusTimer);
    statusTimer = null;
    if (robotDecideTimer) { clearTimeout(robotDecideTimer); robotDecideTimer = null; }
  }

  function flashDecide(){
    const frame = document.getElementById('aiFrame');
    if (frame) frame.setAttribute('data-state', 'decide');
    document.getElementById('statusText').textContent = 'DECISION REACHED';
  }

  async function poll(){
    try {
      const r = await fetch('/api/top2');
      const j = await r.json();
      const round = j.topTwo ? (j.topTwo.round || 1) : (j.currentRound || 1);
      document.getElementById('roundNumQR').textContent = round;
      document.getElementById('roundNumTop').textContent = round;

      const isThinking = !!j.thinking && j.thinkingRemainingMs > 0;
      const hasResult = !!j.topTwo;

      if (isThinking) {
        // Save the eventual result if it's already known
        if (hasResult) pendingTopTwo = j.topTwo;
        switchView('thinking');

        // Schedule the "decision" flash before the result is shown
        if (!robotDecideTimer && j.thinkingRemainingMs > 800) {
          robotDecideTimer = setTimeout(flashDecide, Math.max(0, j.thinkingRemainingMs - 800));
        }
      } else if (hasResult) {
        renderTop3(j.topTwo);
        switchView('top');
        pendingTopTwo = null;
      } else {
        await loadQR();
        await loadStats();
        switchView('qr');
        pendingTopTwo = null;
      }
    } catch(e){}
  }

  poll();
  // Poll faster when thinking might be in progress so we don't miss state changes
  setInterval(poll, 1000);
</script>
</body>
</html>
