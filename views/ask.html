<!doctype html>
<html lang="mn">
<head>
  <meta charset="utf-8" />
  <title>Хурлын Асуулт Илгээх</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #312e81 100%);
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: rgba(30, 41, 59, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 28px 24px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      border: 1px solid rgba(167, 139, 250, 0.2);
    }
    h1 {
      margin: 0 0 6px;
      font-size: 24px;
      background: linear-gradient(135deg, #38bdf8, #a78bfa);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .sub {
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 6px;
      font-weight: 500;
    }
    input, textarea {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 16px;
      font-family: inherit;
      margin-bottom: 16px;
      outline: none;
      transition: border 0.15s;
    }
    input:focus, textarea:focus { border-color: #38bdf8; }
    textarea { min-height: 130px; resize: vertical; }
    button {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      font-weight: 700;
      background: linear-gradient(135deg, #38bdf8 0%, #a78bfa 100%);
      color: white;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg {
      margin-top: 16px;
      padding: 12px;
      border-radius: 10px;
      text-align: center;
      font-weight: 500;
      display: none;
    }
    .msg.ok { background: rgba(34, 197, 94, 0.15); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.3); }
    .msg.err { background: rgba(239, 68, 68, 0.15); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.3); }
    .success-icon {
      font-size: 48px;
      text-align: center;
      margin: 12px 0;
    }
    .char-count {
      text-align: right;
      font-size: 12px;
      color: #64748b;
      margin-top: -12px;
      margin-bottom: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Асуулт илгээх</h1>
    <div class="sub">Илтгэгчдээс асуух асуултаа доорх талбарт бичээд илгээнэ үү.</div>
    <form id="form">
      <label for="name">Таны нэр (заавал биш)</label>
      <input id="name" name="name" maxlength="80" placeholder="Жишээ: Болормаа" autocomplete="name" />

      <label for="question">Асуулт</label>
      <textarea id="question" name="question" maxlength="1000" required placeholder="Илтгэгчээс асуухыг хүсэж буй асуултаа бичнэ үү..."></textarea>
      <div class="char-count"><span id="count">0</span> / 1000</div>

      <button type="submit" id="submitBtn">Илгээх</button>
    </form>
    <div class="msg" id="msg"></div>
  </div>

  <script>
    const form = document.getElementById('form');
    const qInput = document.getElementById('question');
    const countEl = document.getElementById('count');
    const msg = document.getElementById('msg');

    qInput.addEventListener('input', () => {
      countEl.textContent = qInput.value.length;
    });

    function showMsg(text, type, html=false) {
      msg.className = 'msg ' + type;
      msg.style.display = 'block';
      if (html) msg.innerHTML = text; else msg.textContent = text;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Илгээж байна...';
      msg.style.display = 'none';

      const data = {
        name: document.getElementById('name').value.trim(),
        question: qInput.value.trim(),
      };
      if (data.question.length < 3) {
        showMsg('Асуулт хэт богино байна.', 'err');
        btn.disabled = false; btn.textContent = 'Илгээх';
        return;
      }
      try {
        const r = await fetch('/api/questions', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(data),
        });
        const j = await r.json();
        if (j.ok) {
          showMsg('<div class="success-icon">✅</div><div>Асуулт амжилттай илгээгдлээ!</div><div style="font-size:13px;margin-top:6px;opacity:0.8">Өөр асуулт байвал дахин илгээж болно.</div>', 'ok', true);
          form.reset();
          countEl.textContent = '0';
        } else {
          showMsg(j.error || 'Алдаа гарлаа', 'err');
        }
      } catch (err) {
        showMsg('Сүлжээний алдаа: ' + err.message, 'err');
      } finally {
        btn.disabled = false; btn.textContent = 'Илгээх';
      }
    });
  </script>
</body>
</html>
